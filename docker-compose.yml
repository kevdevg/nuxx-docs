version: '3.8'

services:
  app:
    build: .
    expose:
      - "8080"
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017}
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
